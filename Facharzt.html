<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PädiaQuiz – Lernkarten Kinderheilkunde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef4f7; --bg2:#e3edf2;
    --card:#ffffff; --card-edge:#dce6ec;
    --ink:#173445; --ink-soft:#4a6577; --muted:#7c93a1;
    --teal:#0e9aa7; --teal-d:#0a7d88; --teal-soft:#d7f0f2;
    --mint:#34b3a0;
    --green:#1ba373; --green-soft:#e3f6ee;
    --amber:#e0a32a; --amber-soft:#fbf0d8;
    --red:#e0586a; --red-soft:#fcebed;
    --shadow:0 18px 40px -22px rgba(23,52,69,.45);
    --display:"Bricolage Grotesque",system-ui,sans-serif;
    --ui:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--ui); color:var(--ink);
    background:
      radial-gradient(820px 480px at 85% -10%, rgba(52,179,160,.16), transparent 60%),
      radial-gradient(760px 520px at 8% 110%, rgba(14,154,167,.12), transparent 55%),
      linear-gradient(165deg,#f3f8fa 0%, var(--bg) 55%, var(--bg2) 100%);
    min-height:100%; -webkit-font-smoothing:antialiased;
  }
  #app{max-width:860px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:18px 18px 28px}

  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .brand{font-family:var(--display);font-weight:800;letter-spacing:.2px;font-size:1.1rem;color:var(--teal-d);display:flex;align-items:center;gap:9px}
  .cross{width:22px;height:22px;border-radius:6px;background:var(--teal);position:relative;flex:none;box-shadow:0 6px 14px -4px rgba(14,154,167,.6)}
  .cross::before,.cross::after{content:"";position:absolute;background:#fff;border-radius:1px}
  .cross::before{width:10px;height:3px;top:9.5px;left:6px}
  .cross::after{width:3px;height:10px;top:6px;left:9.5px}
  .chips{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .chip{font-size:.72rem;font-weight:600;letter-spacing:.3px;padding:6px 12px;border-radius:999px;background:#fff;border:1px solid var(--card-edge);color:var(--ink-soft)}
  .chip b{color:var(--teal-d)}
  .btn-ghost{font-size:.74rem;font-weight:600;cursor:pointer;background:#fff;border:1px solid var(--card-edge);color:var(--ink-soft);padding:7px 13px;border-radius:999px;transition:.16s}
  .btn-ghost:hover{border-color:var(--teal);color:var(--teal-d)}

  .screen{flex:1;display:flex;flex-direction:column;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .home{flex:1;display:flex;flex-direction:column;justify-content:center;gap:22px;padding:6px}
  .hero{text-align:center;display:flex;flex-direction:column;gap:12px}
  .eyebrow{font-weight:600;letter-spacing:2.5px;text-transform:uppercase;font-size:.72rem;color:var(--teal)}
  h1.title{font-family:var(--display);font-weight:800;line-height:1;margin:0;font-size:clamp(2.2rem,7vw,3.6rem);color:var(--ink)}
  h1.title em{font-style:normal;color:var(--teal-d)}
  .lead{font-size:1.02rem;color:var(--ink-soft);max-width:520px;margin:0 auto;line-height:1.5}
  .modes{display:grid;gap:14px;grid-template-columns:1fr}
  @media(min-width:620px){.modes{grid-template-columns:1fr 1fr}}
  .mode{background:var(--card);border:1px solid var(--card-edge);border-radius:18px;padding:20px;cursor:pointer;transition:.18s;box-shadow:var(--shadow);text-align:left;display:flex;flex-direction:column;gap:9px}
  .mode:hover{transform:translateY(-3px);border-color:var(--teal)}
  .mode .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:var(--teal-soft);color:var(--teal-d);font-size:1.4rem;flex:none}
  .mode h3{font-family:var(--display);font-weight:700;font-size:1.2rem;margin:0;color:var(--ink)}
  .mode p{font-size:.86rem;color:var(--ink-soft);margin:0;line-height:1.45}
  .stat-line{text-align:center;font-size:.8rem;color:var(--muted)}

  .setup-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
  .setup-head .sb{width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid var(--card-edge);color:var(--ink-soft);cursor:pointer;font-size:1.05rem;flex:none}
  .setup-head .sb:hover{color:var(--teal-d);border-color:var(--teal)}
  .setup-head h2{font-family:var(--display);font-weight:800;font-size:1.5rem;margin:0}
  .setup-head p{color:var(--ink-soft);margin:2px 0 0;font-size:.88rem}
  .panel{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-top:14px}
  .panel h4{font-size:.74rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--teal-d);margin:0 0 12px}
  .seg{display:flex;gap:9px;flex-wrap:wrap}
  .seg button{flex:1;min-width:80px;font-family:var(--ui);font-weight:700;font-size:1rem;cursor:pointer;padding:14px 10px;border-radius:12px;border:1.5px solid var(--card-edge);background:#fff;color:var(--ink);transition:.14s}
  .seg button:hover{border-color:var(--teal)}
  .seg button.on{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 8px 18px -8px rgba(14,154,167,.7)}

  .filt-summary{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .filt-summary .info{font-size:.86rem;color:var(--ink-soft)}
  .filt-summary .info b{color:var(--teal-d)}
  .grp{border-top:1px solid var(--card-edge);margin-top:12px;padding-top:12px}
  .grp-head{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
  .grp-head .gt{font-weight:700;font-size:.96rem;flex:1}
  .grp-head .gc{font-size:.76rem;color:var(--muted)}
  .grp-head .tog{font-size:.8rem;color:var(--teal-d);font-weight:600;background:none;border:none;cursor:pointer}
  .grp-items{margin:8px 0 0 26px;display:none;flex-direction:column;gap:6px}
  .grp-items.open{display:flex}
  .grp-items label{display:flex;align-items:center;gap:9px;font-size:.87rem;color:var(--ink-soft);cursor:pointer;padding:3px 0}
  .grp-items label .c2{font-size:.76rem;color:var(--muted);margin-left:auto}
  input[type=checkbox]{width:17px;height:17px;accent-color:var(--teal);cursor:pointer;flex:none}

  .cta{margin-top:18px;display:flex;gap:11px;flex-wrap:wrap}
  .btn-primary{font-family:var(--ui);font-weight:700;font-size:1rem;cursor:pointer;border:none;padding:15px 28px;border-radius:13px;color:#fff;background:linear-gradient(180deg,var(--teal),var(--teal-d));box-shadow:0 12px 26px -10px rgba(14,154,167,.8);transition:.16s;flex:1;min-width:180px}
  .btn-primary:hover{transform:translateY(-2px)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-soft{font-family:var(--ui);font-weight:600;font-size:.95rem;cursor:pointer;padding:15px 22px;border-radius:13px;color:var(--teal-d);background:#fff;border:1.5px solid var(--card-edge);transition:.16s}
  .btn-soft:hover{border-color:var(--teal)}

  /* quiz */
  .quiz{flex:1;display:flex;flex-direction:column}
  .qbar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .qbar .sb{width:34px;height:34px;border-radius:9px;background:#fff;border:1px solid var(--card-edge);color:var(--ink-soft);cursor:pointer;font-size:1rem;flex:none}
  .qbar .sb:hover{color:var(--teal-d)}
  .qmeta{font-size:.78rem;font-weight:600;color:var(--ink-soft)}
  .qmeta .rep{color:var(--amber)}
  .qscore{margin-left:auto;font-size:.78rem;font-weight:700;color:var(--teal-d)}
  .pbar{height:7px;border-radius:999px;background:#dce6ec;overflow:hidden;margin-bottom:16px}
  .pbar span{display:block;height:100%;background:linear-gradient(90deg,var(--mint),var(--teal));width:0;transition:width .35s}

  /* Flip-Karte */
  .flip{perspective:1600px;flex:1;display:flex;min-height:330px}
  .flip-inner{position:relative;width:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--card-edge);border-radius:20px;padding:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:auto}
  .face.back{transform:rotateY(180deg)}
  /* damit die Karte mitwächst statt absolut zu kollabieren */
  .flip-sizer{visibility:hidden;padding:24px}
  .qtags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .tag{font-size:.68rem;font-weight:700;letter-spacing:.4px;padding:4px 10px;border-radius:999px}
  .tag.t-thema{background:var(--teal-soft);color:var(--teal-d)}
  .tag.t-leicht{background:var(--green-soft);color:var(--green)}
  .tag.t-mittel{background:var(--amber-soft);color:#b6841d}
  .tag.t-schwer{background:var(--red-soft);color:var(--red)}
  .side-label{font-size:.68rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .side-label .ln{flex:1;height:1px;background:var(--card-edge)}
  .qtext{font-family:var(--display);font-weight:700;font-size:1.3rem;line-height:1.42;color:var(--ink);margin:0;display:flex;align-items:center;flex:1}
  .atext{font-size:1.12rem;line-height:1.6;color:var(--ink);margin:0;display:flex;align-items:center;flex:1}
  .face.back .side-label{color:var(--teal-d)}

  .flipbtn{margin-top:18px;width:100%;font-family:var(--ui);font-weight:700;font-size:1rem;cursor:pointer;border:none;padding:15px;border-radius:13px;color:#fff;background:linear-gradient(180deg,var(--teal),var(--teal-d));box-shadow:0 12px 26px -10px rgba(14,154,167,.8);transition:.16s}
  .flipbtn:hover{transform:translateY(-2px)}

  .selfcheck{margin-top:16px}
  .selfcheck .q{text-align:center;font-size:.84rem;color:var(--ink-soft);font-weight:600;margin-bottom:10px}
  .rate{display:flex;gap:10px}
  .rate button{flex:1;font-family:var(--ui);font-weight:700;font-size:.98rem;cursor:pointer;padding:15px 8px;border-radius:13px;border:1.5px solid var(--card-edge);background:#fff;transition:.14s;display:flex;flex-direction:column;align-items:center;gap:3px}
  .rate button .em{font-size:1.15rem}
  .rate button .sub{font-size:.68rem;font-weight:500;color:var(--muted)}
  .rate button:hover{transform:translateY(-2px)}
  .rate .sicher{color:var(--green)} .rate .sicher:hover{border-color:var(--green);background:var(--green-soft)}
  .rate .unsicher{color:#b6841d} .rate .unsicher:hover{border-color:var(--amber);background:var(--amber-soft)}
  .rate .falsch{color:var(--red)} .rate .falsch:hover{border-color:var(--red);background:var(--red-soft)}

  /* results */
  .res{flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px;text-align:center}
  .res h2{font-family:var(--display);font-weight:800;font-size:1.7rem;margin:0;color:var(--ink)}
  .ring{width:170px;height:170px;margin:4px auto}
  .scoretxt{font-size:1rem;color:var(--ink-soft)}
  .verdict{font-weight:700;font-size:1.05rem}
  .legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;font-size:.82rem;color:var(--ink-soft)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .breakdown{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;padding:8px 18px;box-shadow:var(--shadow);text-align:left;max-width:560px;margin:0 auto;width:100%}
  .brow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #eef2f5}
  .brow:last-child{border-bottom:none}
  .brow .bt{flex:1;font-size:.9rem;color:var(--ink);font-weight:500}
  .brow .bnum{font-size:.82rem;color:var(--ink-soft);font-weight:600;white-space:nowrap}
  .bmini{width:74px;height:7px;border-radius:999px;background:#e7eef2;overflow:hidden;flex:none}
  .bmini span{display:block;height:100%;border-radius:999px}

  footer{font-size:.72rem;color:var(--muted);text-align:center;margin-top:20px;line-height:1.5}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}.flip-inner{transition:none!important}}
  @media(max-width:520px){.qtext{font-size:1.16rem}.atext{font-size:1.04rem}.rate button{font-size:.9rem}}
</style>
</head>

/* ---------- Setup ---------- */
let setup = { mode:'exam', count:40, selected:new Set() };

function renderSetup(mode){
  setup.mode = mode; setup.selected = new Set();
  chips.style.display='none';
  const examPanel = mode==='exam' ? `
    <div class="panel">
      <h4>Anzahl Karten</h4>
      <div class="seg" id="countSeg">
        ${[20,40,60].map(n=>`<button data-n="${n}" class="${n===setup.count?'on':''}">${n}</button>`).join('')}
      </div>
    </div>` : `
    <div class="panel">
      <h4>Karteikasten-Modus</h4>
      <p style="margin:0;color:var(--ink-soft);font-size:.9rem;line-height:1.5">Es werden <b>100 zufällige Karten</b> aus deiner Auswahl gezogen. Jede Karte, die du als <b>„unsicher“</b> oder <b>„falsch“</b> einschätzt, kommt später erneut – in zufälliger Reihenfolge – bis du alle als <b>„sicher“</b> markiert hast.</p>
    </div>`;

  screen.innerHTML = `
    <div class="screen">
      <div class="setup-head">
        <button class="sb" id="back">↩</button>
        <div>
          <h2>${mode==='exam'?'Prüfungsmodus':'Karteikasten'}</h2>
          <p>Stelle dein Quiz ein und filtere optional nach Themengebieten.</p>
        </div>
      </div>
      ${examPanel}
      <div class="panel">
        <div class="filt-summary">
          <h4 style="margin:0">Themengebiete</h4>
          <div class="info" id="filtInfo"></div>
        </div>
        <div style="margin-top:6px;display:flex;gap:9px;flex-wrap:wrap">
          <button class="btn-ghost" id="selAll">Alle auswählen</button>
          <button class="btn-ghost" id="selNone">Auswahl löschen</button>
        </div>
        <div id="groups"></div>
      </div>
      <div class="cta">
        <button class="btn-primary" id="start">Quiz starten</button>
      </div>
    </div>`;

  document.getElementById('back').onclick=renderHome;
  if(mode==='exam'){
    screen.querySelectorAll('#countSeg button').forEach(b=>{
      b.onclick=()=>{ setup.count=+b.dataset.n; screen.querySelectorAll('#countSeg button').forEach(x=>x.classList.toggle('on', x===b)); updateFiltInfo(); };
    });
  }
  renderGroups();
  document.getElementById('selAll').onclick=()=>{ setup.selected=new Set(); renderGroups(); };
  document.getElementById('selNone').onclick=()=>{ setup.selected=new Set(['__none__']); renderGroups(); };
  document.getElementById('start').onclick=startQuiz;
  updateFiltInfo();
}

function activeThemes(){
  if(setup.selected.size===0) return Object.keys(GROUPS).flatMap(g=>Object.keys(GROUPS[g]));
  if(setup.selected.has('__none__')) return [];
  return [...setup.selected];
}
function poolSize(){ const th=new Set(activeThemes()); return DB.filter(q=>th.has(q.t)).length; }

function updateFiltInfo(){
  const n = poolSize();
  const sel = setup.selected.size===0 ? 'alle Themengebiete' : (setup.selected.has('__none__')?'keine Auswahl':`${setup.selected.size} Themengebiete`);
  const info=document.getElementById('filtInfo');
  if(info) info.innerHTML = `<b>${n}</b> Karten im Pool · ${sel}`;
  const startBtn=document.getElementById('start');
  if(startBtn){
    startBtn.disabled = n===0;
    if(n===0) startBtn.textContent='Keine Karten im Filter';
    else if(setup.mode==='exam' && n<setup.count) startBtn.textContent = `Quiz starten (nur ${n} verfügbar)`;
    else startBtn.textContent = 'Quiz starten';
  }
}

function renderGroups(){
  const host=document.getElementById('groups'); if(!host) return;
  const selectedThemes = new Set(activeThemes());
  host.innerHTML = GROUP_ORDER.filter(g=>GROUPS[g]).map(g=>{
    const themes=Object.keys(GROUPS[g]).sort((a,b)=>a.localeCompare(b,'de'));
    const total=themes.reduce((s,t)=>s+GROUPS[g][t],0);
    const allOn = themes.every(t=>selectedThemes.has(t));
    const someOn = themes.some(t=>selectedThemes.has(t));
    return `<div class="grp" data-g="${esc(g)}">
      <div class="grp-head">
        <input type="checkbox" class="cb gcb" ${allOn?'checked':''} data-g="${esc(g)}">
        <span class="gt">${esc(g)}</span>
        <span class="gc">${themes.length} Themen · ${total} Karten</span>
        <button class="tog" data-g="${esc(g)}">${someOn?'▾':'▸'}</button>
      </div>
      <div class="grp-items ${someOn?'open':''}" data-items="${esc(g)}">
        ${themes.map(t=>`<label><input type="checkbox" class="tcb" data-t="${esc(t)}" ${selectedThemes.has(t)?'checked':''}><span>${esc(t.replace(/^(Leitsymptom|Diagnostik|Therapie): /,''))}</span><span class="c2">${GROUPS[g][t]}</span></label>`).join('')}
      </div>
    </div>`;
  }).join('');

  host.querySelectorAll('.tog').forEach(b=> b.onclick=(e)=>{ e.stopPropagation(); const it=host.querySelector(`[data-items="${CSS.escape(b.dataset.g)}"]`); it.classList.toggle('open'); b.textContent = it.classList.contains('open')?'▾':'▸'; });
  host.querySelectorAll('.gcb').forEach(cb=> cb.onchange=()=>{
    materializeSelection();
    const themes=Object.keys(GROUPS[cb.dataset.g]);
    if(cb.checked) themes.forEach(t=>setup.selected.add(t)); else themes.forEach(t=>setup.selected.delete(t));
    normalizeSelection(); renderGroups(); updateFiltInfo();
  });
  host.querySelectorAll('.tcb').forEach(cb=> cb.onchange=()=>{
    materializeSelection();
    if(cb.checked) setup.selected.add(cb.dataset.t); else setup.selected.delete(cb.dataset.t);
    normalizeSelection(); updateFiltInfo();
    const grpEl=cb.closest('.grp'); const g=grpEl.dataset.g;
    const themes=Object.keys(GROUPS[g]); const sel=new Set(activeThemes());
    grpEl.querySelector('.gcb').checked = themes.every(t=>sel.has(t));
  });
  updateFiltInfo();
}
function materializeSelection(){
  if(setup.selected.size===0){ setup.selected = new Set(Object.keys(GROUPS).flatMap(g=>Object.keys(GROUPS[g]))); }
  else if(setup.selected.has('__none__')){ setup.selected=new Set(); }
}
function normalizeSelection(){
  const all=Object.keys(GROUPS).flatMap(g=>Object.keys(GROUPS[g]));
  if(setup.selected.size===all.length){ setup.selected=new Set(); }
  else if(setup.selected.size===0){ setup.selected=new Set(['__none__']); }
}

/* ---------- Quiz starten ---------- */
function startQuiz(){
  const th=new Set(activeThemes());
  let pool=DB.filter(q=>th.has(q.t));
  if(pool.length===0) return;
  pool=shuffle(pool);
  let count = setup.mode==='exam' ? Math.min(setup.count,pool.length) : Math.min(100,pool.length);
  const items = pool.slice(0,count).map(q=>({q, counted:false, isRepeat:false}));
  state = {
    mode:setup.mode, queue:items, idx:0,
    total:items.length, asked:0, sicher:0,
    perTopic:{}, repeats:0, flipped:false, _again:[]
  };
  chips.style.display='flex';
  modeChip.textContent = setup.mode==='exam' ? `Prüfung · ${state.total} Karten` : `Karteikasten · ${state.total} Karten`;
  renderCard();
}

/* ---------- Karte rendern ---------- */
function renderCard(){
  const cur=state.queue[state.idx];
  if(!cur) return renderResults();
  state.flipped=false;
  const q=cur.q;
  const sclass = q.s==='leicht'?'t-leicht':q.s==='schwer'?'t-schwer':'t-mittel';
  const progress = Math.round(Math.min(state.asked,state.total)/state.total*100);
  const repBadge = cur.isRepeat ? ` · <span class="rep">Wiederholung</span>` : '';
  const posInfo = state.mode==='exam' ? `Karte ${state.idx+1} / ${state.total}` : `Beantwortet ${state.asked} / ${state.total}`;

  screen.innerHTML = `
    <div class="quiz">
      <div class="qbar">
        <button class="sb" id="abort">↩</button>
        <span class="qmeta">${posInfo}${repBadge}</span>
        <span class="qscore">${state.sicher} sicher</span>
      </div>
      <div class="pbar"><span style="width:${progress}%"></span></div>

      <div class="flip" id="flip">
        <div class="flip-inner">
          <div class="face front">
            <div class="qtags">
              <span class="tag t-thema">${esc(q.t)}</span>
              <span class="tag ${sclass}">${esc(q.s)}</span>
            </div>
            <div class="side-label">Frage <span class="ln"></span></div>
            <p class="qtext">${esc(q.f)}</p>
          </div>
          <div class="face back">
            <div class="side-label">Antwort <span class="ln"></span></div>
            <p class="atext">${esc(q.e)}</p>
          </div>
        </div>
        <!-- Sizer haelt die Hoehe (groessere der beiden Seiten) -->
        <div class="flip-sizer" id="sizer"></div>
      </div>

      <div id="action"></div>
    </div>`;

  // Höhe der Flip-Karte = Maximum von Vorder- und Rückseiteninhalt
  sizeCard(q, sclass);

  document.getElementById('abort').onclick=()=>{ if(confirm('Quiz abbrechen? Der Fortschritt geht verloren.')) renderHome(); };
  renderAction(); // zunächst nur "Umdrehen"
}

/* misst beide Seiten und setzt feste Höhe, damit absolute Faces nicht kollabieren */
function sizeCard(q, sclass){
  const flip=document.getElementById('flip');
  const sizer=document.getElementById('sizer');
  // Sizer rendert beide Inhalte nacheinander, wir nehmen das Maximum
  const front = document.querySelector('.face.front').scrollHeight;
  const back = document.querySelector('.face.back').scrollHeight;
  const h = Math.max(front, back, 300);
  flip.style.height = h + 'px';
  if(sizer) sizer.style.display='none';
}

function renderAction(){
  const host=document.getElementById('action');
  if(!state.flipped){
    host.innerHTML = `<button class="flipbtn" id="flipBtn">Karte umdrehen ↻</button>`;
    document.getElementById('flipBtn').onclick=flipCard;
  } else {
    host.innerHTML = `
      <div class="selfcheck">
        <div class="q">Wusstest du die Antwort?</div>
        <div class="rate">
          <button class="sicher" data-r="sicher"><span class="em">✓</span>Sicher<span class="sub">gewusst</span></button>
          <button class="unsicher" data-r="unsicher"><span class="em">~</span>Unsicher<span class="sub">kommt wieder</span></button>
          <button class="falsch" data-r="falsch"><span class="em">✗</span>Falsch<span class="sub">kommt wieder</span></button>
        </div>
      </div>`;
    host.querySelectorAll('.rate button').forEach(b=> b.onclick=()=>rate(b.dataset.r));
  }
}

function flipCard(){
  state.flipped=true;
  document.getElementById('flip').classList.add('flipped');
  renderAction();
}

function rate(r){
  const cur=state.queue[state.idx];
  const q=cur.q;
  if(!cur.counted){
    cur.counted=true;
    state.asked++;
    const pt = state.perTopic[q.t] ||= {c:0,n:0};
    pt.n++;
    if(r==='sicher'){ state.sicher++; pt.c++; }
  }
  // Karteikasten: unsicher + falsch erneut einreihen
  if(state.mode==='box' && r!=='sicher'){
    state._again.push(q);
  }
  goNext();
}

function goNext(){
  state.idx++;
  if(state.idx >= state.queue.length){
    if(state.mode==='box' && state._again.length>0){
      state.repeats++;
      state.queue = shuffle(state._again).map(q=>({q, counted:true, isRepeat:true}));
      state._again=[];
      state.idx=0;
      renderCard();
      return;
    }
    return renderResults();
  }
  renderCard();
}

/* ---------- Ergebnis ---------- */
function renderResults(){
  const pct = state.asked? Math.round(state.sicher/state.asked*100):0;
  const verdict = pct>=85?{t:'Hervorragend! 🎓',c:'var(--green)'} : pct>=70?{t:'Gut gemacht!',c:'var(--teal-d)'} : pct>=50?{t:'Solide – dranbleiben.',c:'var(--amber)'} : {t:'Weiter üben!',c:'var(--red)'};
  const R=70, C=2*Math.PI*R, off=C*(1-pct/100);
  const ringColor = pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)';

  const rows=Object.entries(state.perTopic)
    .map(([t,o])=>({t, c:o.c, n:o.n, p:Math.round(o.c/o.n*100)}))
    .sort((a,b)=> a.p-b.p || b.n-a.n);

  const repNote = state.mode==='box' && state.repeats>0
    ? `<div class="scoretxt">Du hast ${state.repeats} Wiederholungsrunde${state.repeats>1?'n':''} gebraucht, bis alle Karten sicher saßen.</div>` : '';

  screen.innerHTML = `
    <div class="screen">
      <div class="res">
        <div class="eyebrow" style="color:var(--teal)">${state.mode==='exam'?'Prüfung abgeschlossen':'Karteikasten geleert'}</div>
        <h2>Dein Ergebnis</h2>
        <svg class="ring" viewBox="0 0 170 170">
          <circle cx="85" cy="85" r="${R}" fill="none" stroke="#e1eaef" stroke-width="14"/>
          <circle cx="85" cy="85" r="${R}" fill="none" stroke="${ringColor}" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 85 85)"/>
          <text x="85" y="80" text-anchor="middle" font-family="Bricolage Grotesque,sans-serif" font-weight="800" font-size="38" fill="#173445">${pct}%</text>
          <text x="85" y="104" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#7c93a1">${state.sicher} / ${state.asked} sicher</text>
        </svg>
        <div class="verdict" style="color:${verdict.c}">${verdict.t}</div>
        <div class="scoretxt">Quote basiert auf deiner Selbsteinschätzung beim Erstversuch.</div>
        ${repNote}
        <div class="breakdown">
          ${rows.map(r=>{
            const col = r.p>=70?'var(--green)':r.p>=50?'var(--amber)':'var(--red)';
            return `<div class="brow">
              <span class="bt">${esc(r.t)}</span>
              <span class="bmini"><span style="width:${r.p}%;background:${col}"></span></span>
              <span class="bnum">${r.c}/${r.n} · ${r.p}%</span>
            </div>`;
          }).join('')}
        </div>
        <div class="cta" style="justify-content:center">
          <button class="btn-primary" id="again" style="flex:none">Gleicher Modus erneut</button>
          <button class="btn-soft" id="home">Startseite</button>
        </div>
      </div>
    </div>`;
  document.getElementById('home').onclick=renderHome;
  document.getElementById('again').onclick=()=>renderSetup(state.mode);
}

/* Tastatur: Leertaste/Enter = umdrehen; danach 1/2/3 = sicher/unsicher/falsch */
document.addEventListener('keydown', e=>{
  if(!state || !state.queue) return;
  const flipBtn=document.getElementById('flipBtn');
  if(flipBtn && (e.key===' '||e.key==='Enter')){ e.preventDefault(); flipBtn.click(); return; }
  if(state.flipped){
    const map={'1':'sicher','2':'unsicher','3':'falsch'};
    if(e.key in map){ e.preventDefault(); const b=screen.querySelector(`.rate .${map[e.key]}`); if(b) b.click(); }
  }
});

window.addEventListener('resize', ()=>{ const f=document.getElementById('flip'); if(f && state && state.queue && state.queue[state.idx]) { f.style.height='auto'; const fr=document.querySelector('.face.front').scrollHeight; const bk=document.querySelector('.face.back').scrollHeight; f.style.height=Math.max(fr,bk,300)+'px'; } });

renderHome();
</script>
</body>
</html>
